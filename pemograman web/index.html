<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home - iqbal</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #04125e, #0a1b8f);
}

header {
    text-align:center;
    padding:30px;
    color:white;
}

nav {
    background:black;
    padding:12px;
    text-align:center;
}

nav a {
    color:white;
    margin:15px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover {
    color:yellow;
}

.container {
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}

.hero {
    text-align:center;
    background:white;
    padding:25px;
    border-radius:15px;
}

.cards {
    display:flex;
    gap:20px;
    margin-top:25px;
    flex-wrap:wrap;
}

.card {
    flex:1;
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

button {
    margin-top:15px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#1215b4;
    color:white;
    cursor:pointer;
}

footer {
    background:black;
    color:white;
    text-align:center;
    padding:12px;
    margin-top:30px;
}
</style>

</head>

<body>

<header>
    <h1>🚀 Website iqbal</h1>
    <p>Belajar Web Programming</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="profil.html">Profil</a>
    <a href="kontak.html">Kontak</a>
</nav>

<div class="container">

    <div class="hero">
        <h2>Selamat Datang 👋</h2>
        <p>Klik salah satu materi di bawah ini untuk mengetahui apa gunanya html.css.javascript 🔥</p>

        <!-- 🔥 SALAM TETAP ADA -->
        <button onclick="salam()">Klik Salam</button>
        <p id="hasil"></p>
    </div>

    <div class="cards">
        <div class="card" onclick="showContent('html')">
            <h3>📚 HTML</h3>
            <p>Belajar struktur dasar website</p>
        </div>

        <div class="card" onclick="showContent('css')">
            <h3>🎨 CSS</h3>
            <p>Membuat tampilan jadi keren</p>
        </div>

        <div class="card" onclick="showContent('js')">
            <h3>⚡ JavaScript</h3>
            <p>Membuat website interaktif</p>
        </div>
    </div>

    <!-- HASIL KLIK -->
    <div id="contentBox" style="display:none; margin-top:20px;" class="hero"></div>

</div>

<footer>
    <p>© iqbal 😎</p>
</footer>

<script>
function salam(){
    document.getElementById("hasil").innerHTML="Terima kasih, senang bisa bergabung 😎🔥";
}

function showContent(type){
    let isi = "";

    if(type === "html"){
        isi = `
        <h2>📚 HTML</h2>
        <p>HTML adalah bahasa dasar untuk membuat struktur website, seperti judul, paragraf, gambar, dan link.</p>
        <button onclick="kembali()">⬅ Kembali</button>
        `;
    }
    else if(type === "css"){
        isi = `
        <h2>🎨 CSS</h2>
        <p>CSS digunakan untuk mempercantik tampilan website seperti warna, layout, font, dan animasi.</p>
        <button onclick="kembali()">⬅ Kembali</button>
        `;
    }
    else if(type === "js"){
        isi = `
        <h2>⚡ JavaScript</h2>
        <p>JavaScript digunakan untuk membuat website menjadi interaktif seperti tombol, animasi, dan fitur dinamis.</p>
        <button onclick="kembali()">⬅ Kembali</button>
        `;
    }

    document.getElementById("contentBox").innerHTML = isi;
    document.getElementById("contentBox").style.display = "block";
}

function kembali(){
    document.getElementById("contentBox").style.display = "none";
}
</script>

</body>
</html>
